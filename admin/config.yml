backend:
  name: github
  repo: Cubclipse/cubclipse-site
  branch: main

media_folder: "assets/img/products"
public_folder: "/assets/img/products"

collections:
  - name: "totes"
    label: "Tote Bags"
    files:
      - name: "catalog"
        label: "Katalog — Totes"
        file: "data/products-totes.json"
        fields:
          - label: "Produkty"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "ID (bez mezer, malá písmena, pomlčky)", name: "id", widget: "string" }
              - { label: "Název produktu", name: "name", widget: "string" }
              - { label: "Cena (USD)", name: "price", widget: "number", required: false }
              - { label: "Zatím jen \"Coming Soon\"?", name: "comingSoon", widget: "boolean", default: false }
              - { label: "Hlavní fotka", name: "image", widget: "image", required: false }
              - label: "Galerie (další fotky)"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Fotka", name: "src", widget: "image" }
              - label: "Barevné varianty"
                name: "colors"
                widget: "list"
                required: false
                fields:
                  - { label: "Název barvy", name: "name", widget: "string" }
                  - { label: "Fotka pro tuto barvu", name: "image", widget: "image" }
              - { label: "Popis produktu", name: "description", widget: "text" }
              - { label: "Materiál a péče", name: "material", widget: "text", required: false }
              - { label: "Rozměry", name: "dimensions", widget: "string", required: false }
              - { label: "Odkaz na Etsy listing", name: "etsyUrl", widget: "string", required: false }

  - name: "mugs"
    label: "Mugs"
    files:
      - name: "catalog"
        label: "Katalog — Mugs"
        file: "data/products-mugs.json"
        fields:
          - label: "Produkty"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "ID (bez mezer, malá písmena, pomlčky)", name: "id", widget: "string" }
              - { label: "Název produktu", name: "name", widget: "string" }
              - { label: "Cena (USD)", name: "price", widget: "number", required: false }
              - { label: "Zatím jen \"Coming Soon\"?", name: "comingSoon", widget: "boolean", default: false }
              - { label: "Hlavní fotka", name: "image", widget: "image", required: false }
              - label: "Galerie (další fotky)"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Fotka", name: "src", widget: "image" }
              - label: "Barevné varianty"
                name: "colors"
                widget: "list"
                required: false
                fields:
                  - { label: "Název barvy", name: "name", widget: "string" }
                  - { label: "Fotka pro tuto barvu", name: "image", widget: "image" }
              - { label: "Popis produktu", name: "description", widget: "text" }
              - { label: "Materiál a péče", name: "material", widget: "text", required: false }
              - { label: "Objem (ml)", name: "volume", widget: "string", required: false }
              - { label: "Odkaz na Etsy listing", name: "etsyUrl", widget: "string", required: false }

  - name: "stickers"
    label: "Stickers"
    files:
      - name: "catalog"
        label: "Katalog — Stickers"
        file: "data/products-stickers.json"
        fields:
          - label: "Produkty"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "ID (bez mezer, malá písmena, pomlčky)", name: "id", widget: "string" }
              - { label: "Název produktu", name: "name", widget: "string" }
              - { label: "Cena (USD)", name: "price", widget: "number", required: false }
              - { label: "Zatím jen \"Coming Soon\"?", name: "comingSoon", widget: "boolean", default: false }
              - { label: "Hlavní fotka", name: "image", widget: "image", required: false }
              - label: "Galerie (další fotky)"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Fotka", name: "src", widget: "image" }
              - { label: "Popis produktu", name: "description", widget: "text" }
              - { label: "Materiál", name: "material", widget: "text", required: false }
              - { label: "Velikost (cm)", name: "size", widget: "string", required: false }
              - { label: "Odkaz na Etsy listing", name: "etsyUrl", widget: "string", required: false }
