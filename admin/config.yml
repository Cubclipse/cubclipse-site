backend:
  name: git-gateway
  repo: Cubclipse/cubclipse-site
  branch: main
  identity_url: https://auth.decapbridge.com/sites/6533ec68-4f8b-48cd-a136-17324486bdc8
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://cubclipse-site.pages.dev

media_folder: "assets/img/products"
public_folder: "/assets/img/products"

collections:
  - name: "totes"
    label: "Tote Bags"
    files:
      - name: "catalog"
        label: "Katalog — Totes"
        file: "data/products-totes.json"
        fields:
          - label: "Produkty"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "ID (bez mezer, malá písmena, pomlčky)", name: "id", widget: "string" }
              - { label: "Název produktu", name: "name", widget: "string" }
              - { label: "Cena (USD)", name: "price", widget: "number", required: false }
              - { label: "Zatím jen \"Coming Soon\"?", name: "comingSoon", widget: "boolean", default: false }
              - { label: "Hlavní fotka", name: "image", widget: "image", required: false }
              - label: "Galerie (další fotky)"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Fotka", name: "src", widget: "image" }
              - label: "Barevné varianty"
                name: "colors"
                widget: "list"
                required: false
                fields:
                  - { label: "Název barvy", name: "name", widget: "string" }
                  - label: "Fotky pro tuto barvu (Max 10)"
                    name: "images"
                    widget: "list"
                    min: 1
                    max: 10
                    field: { label: "Fotka", name: "photo", widget: "image" }
              - { label: "Popis produktu", name: "description", widget: "text" }
              - { label: "Materiál a péče", name: "material", widget: "text", required: false }
              - { label: "Rozměry", name: "dimensions", widget: "string", required: false }
              - { label: "Odkaz na Etsy listing", name: "etsyUrl", widget: "string", required: false }

  - name: "mugs"
    label: "Mugs"
    files:
      - name: "catalog"
        label: "Katalog — Mugs"
        file: "data/products-mugs.json"
        fields:
          - label: "Produkty"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "ID (bez mezer, malá písmena, pomlčky)", name: "id", widget: "string" }
              - { label: "Název produktu", name: "name", widget: "string" }
              - { label: "Cena (USD)", name: "price", widget: "number", required: false }
              - { label: "Zatím jen \"Coming Soon\"?", name: "comingSoon", widget: "boolean", default: false }
              - { label: "Hlavní fotka", name: "image", widget: "image", required: false }
              - label: "Galerie (další fotky)"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Fotka", name: "src", widget: "image" }
              - label: "Barevné varianty"
                name: "colors"
                widget: "list"
                required: false
                fields:
                  - { label: "Název barvy", name: "name", widget: "string" }
                  - label: "Fotky pro tuto barvu (Max 10)"
                    name: "images"
                    widget: "list"
                    min: 1
                    max: 10
                    field: { label: "Fotka", name: "photo", widget: "image" }
              - { label: "Popis produktu", name: "description", widget: "text" }
              - { label: "Materiál a péče", name: "material", widget: "text", required: false }
              - { label: "Rozměry", name: "dimensions", widget: "string", required: false }
              - { label: "Odkaz na Etsy listing", name: "etsyUrl", widget: "string", required: false }

  - name: "stickers"
    label: "Stickers"
    files:
      - name: "catalog"
        label: "Katalog — Stickers"
        file: "data/products-stickers.json"
        fields:
          - label: "Produkty"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "ID (bez mezer, malá písmena, pomlčky)", name: "id", widget: "string" }
              - { label: "Název produktu", name: "name", widget: "string" }
              - { label: "Cena (USD)", name: "price", widget: "number", required: false }
              - { label: "Zatím jen \"Coming Soon\"?", name: "comingSoon", widget: "boolean", default: false }
              - { label: "Hlavní fotka", name: "image", widget: "image", required: false }
              - label: "Galerie (další fotky)"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Fotka", name: "src", widget: "image" }
              - { label: "Popis produktu", name: "description", widget: "text" }
              - { label: "Materiál", name: "material", widget: "text", required: false }
              - { label: "Velikost (cm)", name: "size", widget: "string", required: false }
              - { label: "Odkaz na Etsy listing", name: "etsyUrl", widget: "string", required: false }
